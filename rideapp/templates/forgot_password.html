<!DOCTYPE html>
<html lang="en">
<head>

{% include 'links.html' %}

<link rel="stylesheet" href="/static/css/login-custom.css">

</head>

<body>

<div id="wrapper">

<!-- preloader -->
<div id="de-preloader"></div>

<!-- navbar -->
{% include 'navbar.html' %}

<!-- content -->
<div class="no-bottom no-top zebra" id="content">

<div id="top"></div>


<!-- HERO SECTION -->
<section aria-label="section" class="jarallax" id="section-hero">

<img alt="" class="jarallax-img" src="static/images/background/login2.png">

<div class="v-center">

<div class="container">

<div class="jarallax text-light">

<div class="row">

<div class="col-md-12 text-center">

<div class="hero-title-wrap">

<h1 class="hero-title">Forgot Password</h1>

<p class="hero-subtitle">Recover your account password</p>

<div class="hero-line"></div>

</div>

</div>

<div class="clearfix"></div>

</div>

</div>


<div class="row align-items-center">

<div class="col-lg-4 offset-lg-4">

<div class="login-card">

<!-- Django messages -->
{% if messages %}
{% for i in messages %}

{% if i.tags == 'error' %}

<div class="form-msg form-msg-danger">
<div>{{ i }}</div>
</div>

{% endif %}

{% endfor %}
{% endif %}


<!-- FORM -->

<form action="/forgotpassword"
method="post"
data-parsley-validate
novalidate>

{% csrf_token %}

<div class="field-set">

<label>Email Address</label>

<input class="form-control"
type="email"
name="email"
placeholder="Enter your registered email"
required
data-parsley-required-message="Email is required"
data-parsley-type-message="Enter valid email">

</div>


<div class="mt-3">

<button class="btn-main btn-fullwidth" type="submit">
Verify Email
</button>

</div>


<!-- Back to login -->

<div class="text-center mt-3">

<a href="/login" style="color:#2563eb;">
Back to Login
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

</div>

<!-- footer -->
{% include 'footer.html' %}

</div>


<!-- JS -->
<script src="/static/js/plugins.js"></script>
<script src="/static/js/designesia.js"></script>
<script>

document.getElementById('togglePassword').addEventListene
r('click', function () {
     const passwordField =
document.getElementById('password');
     const passwordIcon =
document.getElementById('passwordIcon');
     if (passwordField.type === 'password') {
       passwordField.type = 'text';
       passwordIcon.classList.replace('bi-eye',
'bi-eye-slash');
     } else {
       passwordField.type = 'password';
       passwordIcon.classList.replace('bi-eye-slash',
'bi-eye');
     }
   });
</script>
</body>
</html>
