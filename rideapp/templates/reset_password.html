<!DOCTYPE html>
<html lang="en">
<head>

{% include 'links.html' %}

<link rel="stylesheet" href="/static/css/login-custom.css">

<style>
    /* password wrapper */
    .pass-wrap {
        position: relative;
    }
    .pass-wrap input {
        padding-right: 45px;
    }
    /* eye icon */
    .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #6b7280;
        font-size: 16px;
        z-index: 5;
    }
    .eye-icon:hover {
        color: #2563eb;
    }
    /* Ensure error list doesn't shift the icon */
    .parsley-errors-list {
        list-style: none;
        padding: 0;
        margin: 5px 0 0 0;
        color: #dc3545;
        font-size: 12px;
    }
</style>

</head>

<body>

<div id="wrapper">

<div id="de-preloader"></div>

{% include 'navbar.html' %}

<div class="no-bottom no-top zebra" id="content">

<div id="top"></div>

<section aria-label="section" class="jarallax" id="section-hero">

<img alt="" class="jarallax-img" src="static/images/background/login2.png">

<div class="v-center">

<div class="container">

<div class="jarallax text-light">
    <div class="row">
        <div class="col-md-12 text-center">
            <div class="hero-title-wrap">
                <h1 class="hero-title">Reset Password</h1>
                <p class="hero-subtitle">Enter your new account password</p>
                <div class="hero-line"></div>
            </div>
        </div>
        <div class="clearfix"></div>
    </div>
</div>

<div class="row align-items-center">
    <div class="col-lg-4 offset-lg-4">
        <div class="login-card">

            {% if messages %}
                {% for i in messages %}
                    {% if i.tags == 'error' %}
                        <div class="form-msg form-msg-danger">
                            <div>{{ i }}</div>
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}

            <form method="post" data-parsley-validate novalidate>
                {% csrf_token %}

                <div class="field-set">
                    <label>New Password</label>
                    <div class="pass-wrap">
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter new password"
                               required
                               data-parsley-minlength="6"
                               data-parsley-required-message="Password is required"
                               data-parsley-errors-container="#password-error">
                        <i class="fa fa-eye eye-icon" onclick="togglePassword('password', this)"></i>
                    </div>
                    <div id="password-error"></div>
                </div>

                <div class="field-set mt-3">
                    <label>Confirm New Password</label>
                    <div class="pass-wrap">
                        <input type="password"
                               id="repassword"
                               name="re-password"
                               class="form-control"
                               placeholder="Confirm new password"
                               required
                               data-parsley-equalto="#password"
                               data-parsley-required-message="Confirm password is required"
                               data-parsley-equalto-message="Passwords do not match"
                               data-parsley-errors-container="#repassword-error">
                        <i class="fa fa-eye eye-icon" onclick="togglePassword('repassword', this)"></i>
                    </div>
                    <div id="repassword-error"></div>
                </div>

                <div class="mt-3">
                    <button class="btn-main btn-fullwidth" type="submit">
                        Update Password
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

</div>
</div>

</section>
</div>

{% include 'footer.html' %}

</div>

<script src="/static/js/plugins.js"></script>
<script src="/static/js/designesia.js"></script>
<script>
    function togglePassword(id, icon) {
        var input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script>

</body>
</html>
