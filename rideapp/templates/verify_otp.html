<!DOCTYPE html>
<html lang="en">
<head>

{% include 'links.html' %}
<link rel="stylesheet" href="/static/css/login-custom.css">

<style>
/* OTP BOXES */
.otp-wrapper {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
}

.otp-input {
    width: 48px;
    height: 58px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    transition: all 0.25s ease;
}

.otp-input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
    transform: translateY(-2px);
    outline: none;
}

.otp-input.filled {
    border-color: #16a34a;
    background: #f0fdf4;
}

/* Shake animation */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
}

.otp-error {
    animation: shake 0.3s;
}

/* Timer */
#timer {
    font-size: 14px;
    color: #888;
}
</style>

</head>

<body>

<div id="wrapper">

<div id="de-preloader"></div>

{% include 'navbar.html' %}

<div class="no-bottom no-top zebra" id="content">
<div id="top"></div>

<section aria-label="section" class="jarallax" id="section-hero">

<img alt="" class="jarallax-img" src="/static/images/background/login2.png">

<div class="v-center">
<div class="container">
<div class="jarallax text-light">

<div class="row">
<div class="col-md-12 text-center">
<div class="hero-title-wrap">

<h1 class="hero-title">Verify OTP</h1>
<p class="hero-subtitle">Enter the OTP sent to your email</p>
<div class="hero-line"></div>

</div>
</div>
<div class="clearfix"></div>
</div>

</div>

<div class="row align-items-center">
<div class="col-lg-4 offset-lg-4">

<div class="login-card">

<!-- Django Messages -->
{% if messages %}
{% for i in messages %}
{% if i.tags == 'error' %}
<div class="form-msg form-msg-danger">
<div>{{ i }}</div>
</div>
{% endif %}
{% endfor %}
{% endif %}

<form action="/verifying-otp" method="post">
{% csrf_token %}

<div class="field-set text-center">

<label>Enter OTP</label>

<div class="otp-wrapper">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
</div>

<input type="hidden" name="otp" id="finalOtp">

</div>

<div class="mt-3">
<button class="btn-main btn-fullwidth" type="submit">
Verify OTP
</button>
</div>
<!--
 Timer
<div class="text-center mt-3">
    <span id="timer">Resend OTP in 30s</span><br>

    <a href="/forgot_password" id="resendBtn" style="display:none; color:#2563eb;">
        Resend OTP
    </a>
</div>-->

<div class="text-center mt-2">
<a href="/login" style="color:#2563eb;">
Back to Login
</a>
</div>

</form>

</div>

</div>
</div>

</div>
</div>

</section>
</div>

{% include 'footer.html' %}

</div>

<script src="/static/js/plugins.js"></script>
<script src="/static/js/designesia.js"></script>

<!-- OTP JS -->
<script>
const inputs = document.querySelectorAll('.otp-input');
const hiddenInput = document.getElementById('finalOtp');

// Focus first input
window.onload = () => inputs[0].focus();

// Only numbers
inputs.forEach(input => {
    input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });
});

// Auto move + style
inputs.forEach((input, index) => {

    input.addEventListener('input', (e) => {
        if (e.target.value) {
            input.classList.add('filled');
        } else {
            input.classList.remove('filled');
        }

        if (e.target.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateOTP();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === "Backspace") {
            input.classList.remove('filled');

            if (!input.value && index > 0) {
                inputs[index - 1].focus();
            }
        }
    });

});

// Paste support
inputs[0].addEventListener('paste', (e) => {
    const pasteData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);

    inputs.forEach((input, i) => {
        input.value = pasteData[i] || '';
        if (pasteData[i]) input.classList.add('filled');
    });

    updateOTP();
});

// Combine OTP
function updateOTP() {
    let otp = '';
    inputs.forEach(input => otp += input.value);
    hiddenInput.value = otp;
}

// Validate before submit
document.querySelector('form').addEventListener('submit', function(e) {
    if (hiddenInput.value.length < 6) {
        e.preventDefault();

        const wrapper = document.querySelector('.otp-wrapper');
        wrapper.classList.add('otp-error');

        setTimeout(() => {
            wrapper.classList.remove('otp-error');
        }, 300);
    }
});
</script>

</body>
</html>
